name: Avatar Analyzer V3.2 validation

on:
  pull_request:
    paths:
      - "app/api/avatar/**"
      - "components/library/**"
      - "worker/garment-rig/**"
      - "tests-avatar-analyzer-v32.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/avatar-analyzer-v32.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    name: Typecheck, tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role
      BLENDER_WORKER_URL: https://worker.invalid
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  worker:
    name: Blender Worker Docker tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Worker without publishing
        uses: docker/build-push-action@v6
        with:
          context: worker/garment-rig
          file: worker/garment-rig/Dockerfile
          push: false
          load: false
          cache-from: type=gha,scope=avatar-analyzer-v32
          cache-to: type=gha,mode=max,scope=avatar-analyzer-v32
