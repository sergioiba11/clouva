name: Run Real Blender AutoRig Payload

on:
  pull_request:
    paths:
      - ".github/workflows/run-real-autorig-payload.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Decode stored AutoRig payload
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import gzip
          from pathlib import Path

          source_lines = Path('.github/workflows/apply-real-autorig-v1.yml').read_text().splitlines()
          paths = (
              'worker/garment-rig/autorig_avatar_v1.py',
              'worker/garment-rig/test_autorig_avatar_v1.py',
          )
          decoded = 0
          for path in paths:
              marker = f'"{path}": "'
              matching = next((line for line in source_lines if marker in line), None)
              if matching is None:
                  raise SystemExit(f'Payload marker not found: {path}')
              encoded = matching.split(marker, 1)[1].rsplit('"', 1)[0]
              target = Path(path)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_bytes(gzip.decompress(base64.b64decode(encoded)))
              decoded += 1
          if decoded != len(paths):
              raise SystemExit(f'Expected {len(paths)} files, decoded {decoded}')
          PY
      - name: Validate Python syntax
        run: python -m py_compile worker/garment-rig/autorig_avatar_v1.py worker/garment-rig/test_autorig_avatar_v1.py
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worker/garment-rig/autorig_avatar_v1.py worker/garment-rig/test_autorig_avatar_v1.py
          git commit -m "Add real Blender AutoRig from clean avatar"
          git push origin HEAD:${{ github.head_ref }}
