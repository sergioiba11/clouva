name: Assemble Real Blender AutoRig V12

on:
  pull_request:
    paths:
      - ".github/workflows/run-real-autorig-payload.yml"

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Assemble AutoRig source
        run: |
          cat .autorig-v12-payload/part00.pyfrag \
              .autorig-v12-payload/part01.pyfrag \
              .autorig-v12-payload/part02.pyfrag \
              .autorig-v12-payload/part03.pyfrag \
              > worker/garment-rig/autorig_avatar_v12.py
          python -m py_compile \
              worker/garment-rig/autorig_avatar_v12.py \
              worker/garment-rig/test_autorig_avatar_v12.py
      - name: Commit AutoRig source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worker/garment-rig/autorig_avatar_v12.py
          git commit -m "Add real Blender AutoRig V12"
          git push origin HEAD:${{ github.head_ref }}
