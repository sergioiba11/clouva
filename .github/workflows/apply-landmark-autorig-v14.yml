          contracts = Path("tests-avatar-blender-autorig.mjs")
          contract_text = contracts.read_text(encoding="utf-8")
          contract_text = contract_text.replace(
              'EXPECTED_WORKER_RIG_VERSION = "v12-real-blender-autorig"',
              'EXPECTED_WORKER_RIG_VERSION = "v14-landmark-autorig"',
          ).replace(
              'EXPECTED_PROFILE_VERSION = "clouva-blender-autorig-v12-official-reference"',
              'EXPECTED_PROFILE_VERSION = "clouva-blender-autorig-v14-landmarks-heat"',
          ).replace(
              'Blender V12 creó un rig nuevo',
              'Blender V14 ajustó articulaciones y creó un rig nuevo',
          )
          contract_text += '''\n\ntest("AutoRig V14 ajusta cada cadena con landmarks y usa pesos automáticos de Blender", () => {\n  assert.match(workerAutorig, /mesh-landmarks-per-chain-v14/);\n  assert.match(workerAutorig, /ARMATURE_AUTO/);\n  assert.match(workerAutorig, /automatic-heat-body-plus-projected-parts-v14/);\n  assert.match(rigRoute, /landmarkFit\\?\\.method !== "mesh-landmarks-per-chain-v14"/);\n});\n'''
          contracts.write_text(contract_text, encoding="utf-8")

          Path(".github/workflows/apply-landmark-autorig-v14.yml").unlink()
          PY
      - name: Validate source contracts
        run: |
          node --test tests-avatar-blender-autorig.mjs
          python -m py_compile worker/garment-rig/autorig_avatar_v12.py worker/garment-rig/app_v16.py worker/garment-rig/test_autorig_avatar_v12.py
      - name: Commit AutoRig V14
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fit avatar rig from mesh landmarks and automatic weights"
          git push origin HEAD:${{ github.head_ref }}
