name: Debug Rig V10

on:
  pull_request:
    paths:
      - "worker/garment-rig/**"
      - ".github/workflows/debug-rig-v10.yml"

jobs:
  docker-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build worker and capture complete log
        id: worker-build
        shell: bash
        run: |
          set +e
          docker build --progress=plain -f worker/garment-rig/Dockerfile worker/garment-rig > rig-v10-build.log 2>&1
          code=$?
          echo "$code" > rig-v10-exit-code.txt
          tail -n 160 rig-v10-build.log
          exit 0
      - name: Upload diagnostic log
        uses: actions/upload-artifact@v4
        with:
          name: rig-v10-build-log
          path: |
            rig-v10-build.log
            rig-v10-exit-code.txt
      - name: Preserve build result
        shell: bash
        run: test "$(cat rig-v10-exit-code.txt)" = "0"
