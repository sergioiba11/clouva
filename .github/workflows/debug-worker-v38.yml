name: Debug Worker V38

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  debug-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Build worker and publish failure tail
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          docker build --progress=plain -t clouva-garment-rig:debug worker/garment-rig > /tmp/clouva-worker-build.log 2>&1
          code=$?
          if [ "$code" -ne 0 ]; then
            {
              echo '### V38 Docker failure tail'
              echo '```text'
              tail -n 100 /tmp/clouva-worker-build.log
              echo '```'
            } > /tmp/clouva-pr-comment.md
            gh pr comment "$PR_NUMBER" --body-file /tmp/clouva-pr-comment.md
            exit "$code"
          fi
          echo "Worker build OK"
