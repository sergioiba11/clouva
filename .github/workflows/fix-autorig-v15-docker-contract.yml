name: Fix AutoRig V15 Docker Contract

on:
  pull_request:
    paths:
      - ".github/workflows/fix-autorig-v15-docker-contract.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Update Docker version assertions
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('worker/garment-rig/Dockerfile')
          text = path.read_text(encoding='utf-8')
          old = "v14-landmark-autorig"
          new = "v15-anatomical-landmark-autorig"
          if text.count(old) < 3:
              raise SystemExit(f'Expected at least 3 V14 Docker assertions, found {text.count(old)}')
          text = text.replace(old, new)
          text = text.replace(
              "Worker API + actual avatar complete rig V11 anatomical route OK",
              "Worker API + actual avatar AutoRig V15 anatomical route OK",
          )
          path.write_text(text, encoding='utf-8')
          Path('AUTORIG_V15_DOCKER_ERROR.txt').unlink(missing_ok=True)
          Path('.github/workflows/fix-autorig-v15-docker-contract.yml').unlink()
          PY
      - name: Validate worker image
        run: docker build --progress=plain -t clouva-garment-rig:v15 worker/garment-rig
      - name: Commit Docker contract
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Align Blender worker Docker contract with AutoRig V15"
          git push origin HEAD:${{ github.head_ref }}
