name: Debug AutoRig V15 Terminal

on:
  pull_request:
    paths:
      - ".github/workflows/debug-autorig-v15-terminal.yml"

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply terminal assertion and capture Docker output
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('worker/garment-rig/test_autorig_avatar_v12.py')
          text = path.read_text(encoding='utf-8')
          old = '    names = {bone.name for bone in armature.data.bones}\n    assert len(names) >= 50\n    assert "clouva_head_end" in names or "Head_end" in names\n'
          new = '    names = {bone.name for bone in armature.data.bones}\n    lower_names = {name.lower() for name in names}\n    assert len(names) >= 50\n    assert "clouva_head_end" in lower_names or "head_end" in lower_names\n'
          if old in text:
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
          set +e
          docker build --progress=plain -t clouva-garment-rig:v15-terminal worker/garment-rig > /tmp/v15-terminal.log 2>&1
          status=$?
          rm -f .github/workflows/debug-autorig-v15-terminal.yml .github/workflows/fix-autorig-v15-terminal-test.yml AUTORIG_V15_REAL_ERROR.txt
          if [ "$status" -ne 0 ]; then
            printf 'exit=%s\n' "$status" > AUTORIG_V15_TERMINAL_ERROR.txt
            tail -n 400 /tmp/v15-terminal.log >> AUTORIG_V15_TERMINAL_ERROR.txt
          else
            rm -f AUTORIG_V15_TERMINAL_ERROR.txt
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply AutoRig V15 terminal validation"
          git push origin HEAD:${{ github.head_ref }}
          exit 0
