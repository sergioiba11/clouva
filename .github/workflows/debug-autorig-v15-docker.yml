name: Debug AutoRig V15 Docker

on:
  pull_request:
    paths:
      - ".github/workflows/debug-autorig-v15-docker.yml"

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Run Blender worker build and capture output
        shell: bash
        run: |
          set +e
          docker build --progress=plain -t clouva-garment-rig:v15-debug worker/garment-rig > /tmp/autorig-v15-docker.log 2>&1
          status=$?
          rm -f .github/workflows/debug-autorig-v15-docker.yml
          if [ "$status" -ne 0 ]; then
            printf 'exit=%s\n' "$status" > AUTORIG_V15_DOCKER_ERROR.txt
            tail -n 500 /tmp/autorig-v15-docker.log >> AUTORIG_V15_DOCKER_ERROR.txt
          else
            rm -f AUTORIG_V15_DOCKER_ERROR.txt
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Capture AutoRig V15 Docker validation"
          git push origin HEAD:${{ github.head_ref }}
          exit 0
