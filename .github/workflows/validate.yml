name: Validate CLOUVA

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, agent/base-mesh-auto-rig]

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        shell: bash
        run: |
          set -o pipefail
          if ! npm test > /tmp/clouva-tests.log 2>&1; then
            echo "::group::Últimas 220 líneas de npm test"
            tail -n 220 /tmp/clouva-tests.log
            echo "::endgroup::"
            exit 1
          fi
          tail -n 60 /tmp/clouva-tests.log

      - name: Validate worker Python
        run: python3 -m py_compile worker/garment-rig/*.py tools/unreal_avatar_export/export_clouva_avatar.py

      - name: Build and validate Blender worker image
        shell: bash
        run: |
          set -o pipefail
          if ! docker build --progress=plain -t clouva-garment-rig:test worker/garment-rig > /tmp/clouva-worker-build.log 2>&1; then
            echo "::group::Últimas 160 líneas del build de Blender"
            tail -n 160 /tmp/clouva-worker-build.log
            echo "::endgroup::"
            exit 1
          fi
          tail -n 40 /tmp/clouva-worker-build.log

      - name: Validate AutoRig V16 end to end in Blender
        shell: bash
        run: |
          set -o pipefail
          if ! docker run --rm \
            -v "${{ github.workspace }}/worker/garment-rig/test_autorig_avatar_v16.py:/app/test_autorig_avatar_v16_external.py:ro" \
            clouva-garment-rig:test \
            /opt/blender/blender --background --factory-startup --python-exit-code 1 \
            --python /app/test_autorig_avatar_v16_external.py \
            > /tmp/clouva-autorig-v16-e2e.log 2>&1; then
            echo "::group::AutoRig V16 end-to-end"
            tail -n 200 /tmp/clouva-autorig-v16-e2e.log
            echo "::endgroup::"
            exit 1
          fi
          tail -n 80 /tmp/clouva-autorig-v16-e2e.log

      - name: Upload validation logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-logs
          path: |
            /tmp/clouva-tests.log
            /tmp/clouva-worker-build.log
            /tmp/clouva-autorig-v16-e2e.log
          if-no-files-found: warn
          retention-days: 3

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
