name: Railway direct deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/railway-direct-deploy.yml
      - app/railway-deploy-trigger.txt
  pull_request:
    branches:
      - main
    paths:
      - app/railway-deploy-trigger.txt

concurrency:
  group: railway-direct-deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      PROJECT_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      ALT_PROJECT_TOKEN: ${{ secrets.RAILWAY_PROJECT_TOKEN }}
      ALT_DEPLOY_TOKEN: ${{ secrets.RAILWAY_DEPLOY_TOKEN }}
    steps:
      - name: Checkout CLOUVA
        uses: actions/checkout@v4

      - name: Select Railway credential
        shell: bash
        run: |
          if [ -n "$PROJECT_TOKEN" ]; then
            echo "RAILWAY_TOKEN=$PROJECT_TOKEN" >> "$GITHUB_ENV"
          elif [ -n "$API_TOKEN" ]; then
            echo "RAILWAY_API_TOKEN=$API_TOKEN" >> "$GITHUB_ENV"
          elif [ -n "$ALT_PROJECT_TOKEN" ]; then
            echo "RAILWAY_TOKEN=$ALT_PROJECT_TOKEN" >> "$GITHUB_ENV"
          elif [ -n "$ALT_DEPLOY_TOKEN" ]; then
            echo "RAILWAY_TOKEN=$ALT_DEPLOY_TOKEN" >> "$GITHUB_ENV"
          else
            echo "::error::No hay ningún secreto de Railway disponible en GitHub Actions."
            exit 1
          fi

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Deploy CLOUVA directly to Railway
        run: railway up --project 738f9622-30b0-4aea-8c5d-0d8db474a47a --environment production --service clouva --ci --yes
