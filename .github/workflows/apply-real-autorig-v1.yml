name: Apply Real Blender AutoRig V1

on:
  push:
    branches:
      - fix/real-blender-autorig-v1
    paths:
      - ".github/workflows/apply-real-autorig-v1.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/real-blender-autorig-v1
      - name: Write Blender AutoRig files
        shell: bash
        run: |
          python - <<'PY'
          import base64, gzip
          from pathlib import Path

          files = {
            "worker/garment-rig/autorig_avatar_v1.py": "",
            "worker/garment-rig/test_autorig_avatar_v1.py": ""
          }
          for path, encoded in files.items():
            target = Path(path)
            target.parent.mkdir(parents=True, exist_ok=True)
            target.write_bytes(gzip.decompress(base64.b64decode(encoded)))
          PY
      - name: Validate Python syntax
        run: python -m py_compile worker/garment-rig/autorig_avatar_v1.py worker/garment-rig/test_autorig_avatar_v1.py
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worker/garment-rig/autorig_avatar_v1.py worker/garment-rig/test_autorig_avatar_v1.py
          git commit -m "Add real Blender AutoRig from clean avatar"
          git push origin HEAD:fix/real-blender-autorig-v1
