name: Build Android APK

on:
  push:
    branches:
      - agent/android-capacitor
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (Next.js)
        run: npx tsc --noEmit

      - name: Build Next.js (validación, no se empaqueta en el APK)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle (con caché)
        uses: gradle/actions/setup-gradle@v4

      - name: Capacitor sync (Android)
        run: |
          echo "node: $(node --version)"
          echo "npm: $(npm --version)"
          echo "JAVA_HOME: $JAVA_HOME"
          npx cap sync android 2>&1 | tee /tmp/cap-sync.log
          exit ${PIPESTATUS[0]}

      - name: Guardar log de diagnóstico si algo falló
        if: failure()
        run: |
          git config user.email "ci@clouva.com.ar"
          git config user.name "CI Debug"
          git fetch origin
          git checkout -B debug/ci-logs
          mkdir -p .ci-debug
          cp /tmp/cap-sync.log .ci-debug/cap-sync-${{ github.run_id }}.log
          git add .ci-debug
          git commit -m "Debug log run ${{ github.run_id }}"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" debug/ci-logs

      - name: Dar permiso de ejecución a gradlew
        run: chmod +x android/gradlew

      - name: Compilar APK de debug
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Subir APK como artifact descargable
        uses: actions/upload-artifact@v4
        with:
          name: clouva-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
