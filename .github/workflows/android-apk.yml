name: Build Android APK

on:
  push:
    branches:
      - agent/android-capacitor
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (Next.js)
        run: npx tsc --noEmit

      - name: Build Next.js (validación, no se empaqueta en el APK)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle (con caché)
        uses: gradle/actions/setup-gradle@v4

      - name: Capacitor sync (Android)
        run: npx cap sync android

      - name: Dar permiso de ejecución a gradlew
        run: chmod +x android/gradlew

      - name: Compilar APK de debug
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Subir APK como artifact descargable
        uses: actions/upload-artifact@v4
        with:
          name: clouva-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
