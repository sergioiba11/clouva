          route = "app/api/avatar/rig/route.ts"
          replace(route, 'const EXPECTED_WORKER_RIG_VERSION = "v15-anatomical-landmark-autorig";', 'const EXPECTED_WORKER_RIG_VERSION = "v16-reference-weight-autorig";')
          replace(route, 'const EXPECTED_PROFILE_VERSION = "clouva-blender-autorig-v15-skull-hand-axis";', 'const EXPECTED_PROFILE_VERSION = "clouva-blender-autorig-v16-reference-weights-anatomical-extremities";')
          replace(route,
              '    weights?: { weightedRatio?: number };\n',
              '    weights?: { weightedRatio?: number; method?: string; nearestBoneFallbackRatio?: number; projectionRatio?: number };\n'
              '    weightFallback?: { method?: string; fingerWeightedRatio?: number; earWeightedRatio?: number };\n')
          replace(route,
