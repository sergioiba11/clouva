          replace(app, 'clouva-complete-avatar-rig-v15-', 'clouva-complete-avatar-rig-v16-')
          replace(app, 'validación del AutoRig V15', 'validación del AutoRig V16')
          replace(app, 'if method_source != V15_METHOD_SOURCE:', 'if method_source != V16_METHOD_SOURCE:')
          replace(app, 'origen geométrico V14 esperado', 'origen geométrico V16 esperado')
          replace(app, 'origen real de V14', 'origen real de V16')

