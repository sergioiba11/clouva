              '        and hand_fit.get("l", {}).get("method") == "target-mesh-distal-axis-and-lateral-spread-v16"\n'
              '        and hand_fit.get("r", {}).get("method") == "target-mesh-distal-axis-and-lateral-spread-v16"\n'
              '        and transferred.get("method") == "official-reference-projection-plus-anatomical-extremities-v16"\n'
              '        and transferred.get("nearestBoneFallbackRatio", 1.0) <= 0.01\n'
              '        and fallback.get("method") == "anatomical-envelopes-v16"\n')
          replace(autorig, '[clouva-landmark-autorig-v15]', '[clouva-landmark-autorig-v16]')

          viewer = "components/creator-studio/CreatorStudioAvatarViewerV6.tsx"
          replace(viewer,
