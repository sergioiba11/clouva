              '                if bone is None:\n'
              '                    bpy.ops.object.mode_set(mode="OBJECT")\n'
              '                    raise RuntimeError(f"Missing generated finger bone: {finger} {segment} {side}")\n'
              '                length = total_length / 3.0 * (1.0 - (segment - 1) * 0.12)\n',
              '        offsets = {"thumb": -0.86, "index": -0.40, "middle": 0.0, "ring": 0.38, "pinky": 0.74}\n'
              '        length_factors = {"thumb": 0.44, "index": 0.57, "middle": 0.60, "ring": 0.57, "pinky": 0.49}\n'
              '        root_factors = {"thumb": 0.30, "index": 0.38, "middle": 0.38, "ring": 0.38, "pinky": 0.36}\n'
              '        longest_total = 0.0\n'
              '        for finger in v11.v5.legacy.FINGER_NAMES:\n'
              '            total_length = extent * length_factors[finger]\n'
              '            longest_total = max(longest_total, total_length)\n'
              '            root = wrist + direction * extent * root_factors[finger]\n'
              '            root += spread_axis * offsets[finger] * half_width\n'
              '            finger_direction = direction.copy()\n'
              '            if finger == "thumb":\n'
              '                finger_direction = v11.v10.unit(direction * 0.72 + spread_axis * offsets[finger] * 0.42, direction)\n'
              '            previous = palm_root or hand\n'
              '            cursor = root\n'
              '            for segment in range(1, v11.v5.legacy.SEGMENTS + 1):\n'
              '                bone = bones.get(f"clouva_{finger}_{segment:02d}_{side}")\n'
              '                if bone is None:\n'
              '                    bpy.ops.object.mode_set(mode="OBJECT")\n'
