              '    if (!parent || parent === child) continue;\n',
              '    const parent = nearestPreviewAncestor(child);\n'
              '    if (!parent || parent === child) continue;\n'
              '    // No dibujar el puente jerárquico Hips→muslo: formaba una V falsa sobre la entrepierna.\n'
              '    if (isPelvisBone(parent.name) && isUpperLegBone(child.name)) continue;\n')
          replace(viewer,
              '    for (const ear of ears) {\n'
              '      const earSide = anatomicalSide(ear.name);\n',
              '    for (const ear of ears) {\n'
              '      // En perfil, un hueso lateral de oreja se proyecta sobre mandíbula/cara y parece un rig roto.\n'
