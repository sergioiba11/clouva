              '            "fingerTotalLength": total_length,\n'
              '            "method": "target-mesh-distal-axis-and-lateral-spread-v15",\n'
              '        }\n',
              '        hand_fit[side] = {\n'
              '            "sourceBone": hand.name,\n'
              '            "candidateVertices": len(candidates),\n'
              '            "handExtent": extent,\n'
              '            "handHalfWidth": half_width,\n'
              '            "fingerTotalLength": longest_total,\n'
              '            "wrist": list(map(float, wrist)),\n'
              '            "direction": list(map(float, direction)),\n'
              '            "spreadAxis": list(map(float, spread_axis)),\n'
              '            "method": "target-mesh-distal-axis-and-lateral-spread-v16",\n'
              '        }\n')

