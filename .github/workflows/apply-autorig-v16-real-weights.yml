name: Apply AutoRig V16 Real Weights

on:
  pull_request:
    paths:
      - ".github/workflows/apply-autorig-v16-real-weights.yml"

permissions:
  contents: write

jobs:
  patch-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Apply AutoRig V16
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path, old, new, count=1):
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"Pattern not found in {path}: {old[:240]!r}")
              file.write_text(text.replace(old, new, count), encoding="utf-8")

          autorig = "worker/garment-rig/autorig_avatar_v12.py"
          replace(autorig,
              'VERSION = "clouva-blender-autorig-v15-skull-hand-axis"',
