name: Validate Garment Worker

on:
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile.worker"
      - "services/garment-worker/**"
      - "scripts/blender/**"
      - "assets/clouva-base-rig-v1/**"
  push:
    branches: [agent/base-mesh-auto-rig]
    paths:
      - "Dockerfile.worker"
      - "services/garment-worker/**"
      - "scripts/blender/**"
      - "assets/clouva-base-rig-v1/**"

permissions:
  contents: read

concurrency:
  group: validate-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Python syntax
        run: python -m py_compile services/garment-worker/app.py scripts/blender/rig_clothing.py

      - name: Build Blender worker image
        run: docker build -f Dockerfile.worker -t clouva-garment-worker:test .
