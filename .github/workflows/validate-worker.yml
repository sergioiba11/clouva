name: Validate Garment Worker

on:
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile.worker"
      - "services/garment-worker/**"
      - "scripts/blender/**"
      - "assets/clouva-base-rig-v1/**"
  push:
    branches: [agent/base-mesh-auto-rig]
    paths:
      - "Dockerfile.worker"
      - "services/garment-worker/**"
      - "scripts/blender/**"
      - "assets/clouva-base-rig-v1/**"

permissions:
  contents: read

concurrency:
  group: validate-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Python syntax
        run: python -m py_compile services/garment-worker/app.py scripts/blender/rig_clothing.py

      - name: Build Blender worker image
        shell: bash
        run: |
          set +e
          docker build --progress=plain -f Dockerfile.worker -t clouva-garment-worker:test . > docker-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "Docker build failed. Last 100 lines:"
            tail -n 100 docker-build.log
            exit "$status"
          fi
          tail -n 30 docker-build.log
