name: Apply AutoRig V15 Debug

on:
  pull_request:
    paths:
      - ".github/workflows/apply-autorig-v15-debug.yml"

permissions:
  contents: write

jobs:
  patch-and-capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply patch and capture validation
        shell: bash
        run: |
          set +e
          python - <<'PY' > /tmp/v15-output.txt 2>&1
          from pathlib import Path
          lines = Path('.github/workflows/apply-autorig-v15-anatomy.yml').read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(lines) if line.strip() == "python - <<'PY'") + 1
          end = next(i for i in range(start, len(lines)) if lines[i].strip() == 'PY')
          code = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines[start:end])
          exec(compile(code, 'apply-autorig-v15-anatomy', 'exec'))
          PY
          status=$?
          if [ "$status" -eq 0 ]; then
            node --test tests-avatar-blender-autorig.mjs >> /tmp/v15-output.txt 2>&1
            status=$?
          fi
          if [ "$status" -eq 0 ]; then
            python -m py_compile worker/garment-rig/autorig_avatar_v12.py worker/garment-rig/app_v16.py worker/garment-rig/test_autorig_avatar_v12.py >> /tmp/v15-output.txt 2>&1
            status=$?
          fi
          rm -f .github/workflows/apply-autorig-v15-debug.yml
          if [ "$status" -ne 0 ]; then
            printf 'exit=%s\n' "$status" > PATCH_AUTORIG_V15_ERROR.txt
            cat /tmp/v15-output.txt >> PATCH_AUTORIG_V15_ERROR.txt
          else
            rm -f PATCH_AUTORIG_V15_ERROR.txt
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply AutoRig V15 anatomy patch"
          git push origin HEAD:${{ github.head_ref }}
          exit 0
