name: Debug AutoRig V15 Real

on:
  pull_request:
    paths:
      - ".github/workflows/debug-autorig-v15-real.yml"

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply Docker contract and capture real Blender test
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('worker/garment-rig/Dockerfile')
          text = path.read_text(encoding='utf-8')
          text = text.replace('v14-landmark-autorig', 'v15-anatomical-landmark-autorig')
          text = text.replace('Worker API + actual avatar complete rig V11 anatomical route OK', 'Worker API + actual avatar AutoRig V15 anatomical route OK')
          path.write_text(text, encoding='utf-8')
          PY
          set +e
          docker build --progress=plain -t clouva-garment-rig:v15-real worker/garment-rig > /tmp/v15-real.log 2>&1
          status=$?
          rm -f .github/workflows/debug-autorig-v15-real.yml .github/workflows/fix-autorig-v15-docker-contract.yml AUTORIG_V15_DOCKER_ERROR.txt
          if [ "$status" -ne 0 ]; then
            printf 'exit=%s\n' "$status" > AUTORIG_V15_REAL_ERROR.txt
            tail -n 650 /tmp/v15-real.log >> AUTORIG_V15_REAL_ERROR.txt
          else
            rm -f AUTORIG_V15_REAL_ERROR.txt
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Align AutoRig V15 Docker contract and capture Blender validation"
          git push origin HEAD:${{ github.head_ref }}
          exit 0
