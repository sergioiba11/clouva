name: Debug V43 Docker

on:
  push:
    branches: [fix/canonical-rest-bind-v43]

permissions:
  contents: read

jobs:
  docker-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Capture Docker build
        id: docker
        shell: bash
        run: |
          set +e
          docker build --progress=plain -t clouva-garment-rig:debug worker/garment-rig > docker-build.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          tail -n 400 docker-build.log
          exit 0

      - name: Upload Docker log
        uses: actions/upload-artifact@v4
        with:
          name: v43-docker-build-log
          path: docker-build.log
          if-no-files-found: error
          retention-days: 1

      - name: Fail after upload
        if: steps.docker.outputs.exit_code != '0'
        run: exit 1
